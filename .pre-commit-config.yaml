default_install_hook_types:
  - pre-commit
minimum_pre_commit_version: 3.7.0
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        pass_filenames: true
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        pass_filenames: true
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: viewer-lint
        name: viewer lint
        entry: npm --prefix viewer/web run lint
        language: system
        pass_filenames: false
        files: ^viewer/web/
        stages: [pre-commit]
      - id: viewer-typecheck
        name: viewer typecheck
        entry: npm --prefix viewer/web run typecheck
        language: system
        pass_filenames: false
        files: ^viewer/web/
        stages: [pre-commit]
